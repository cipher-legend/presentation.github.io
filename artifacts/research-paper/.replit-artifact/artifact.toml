kind = "web"
previewPath = "/"
title = "Conscience & Complicity — Research Paper"
version = "1.0.0"
id = "artifacts/research-paper"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22624

[services.development]
run = "pnpm --filter @workspace/research-paper run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/research-paper", "run", "build" ]
publicDir = "artifacts/research-paper/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22624"
BASE_PATH = "/"
